# Codegen policy for buying.
#
# `user_owned` globs are hand-written files that live inside generator-owned trees but are
# NOT schema-derived. `metaphor schema generate [--force]` skips them wholesale (never reads,
# merges, or deletes them). Everything else in src/ is regenerated from schema/models.
#
# Re-exports/declarations that must sit alongside generated code live inside
# `// <<< CUSTOM ... // END CUSTOM` markers (service/mod.rs, presentation/http/mod.rs, lib.rs)
# and are preserved by the marker mechanism, not listed here.
#
# Add your hand-authored services, handlers, tests, and docs below as you write them.

user_owned:
  - "src/application/service/buying_events.rs"
  - "src/application/service/buying_write_service.rs"
  # Own the hand-written buying SQL (the procure-to-pay funnel's header+line inserts and state flips,
  # the receipt seam's remaining-quantity read, the 3-way-match allocation's locking read + watermark
  # bumps) that the write service orchestrates. Declared here — not renamed with a `_custom` suffix —
  # so the generator skips them wholesale; this declaration is what makes editing them legitimate.
  - "src/infrastructure/persistence/material_request_repository.rs"
  - "src/infrastructure/persistence/material_request_item_repository.rs"
  - "src/infrastructure/persistence/purchase_order_repository.rs"
  - "src/infrastructure/persistence/purchase_order_item_repository.rs"
  - "src/infrastructure/persistence/request_for_quotation_repository.rs"
  - "src/infrastructure/persistence/rfq_item_repository.rs"
  - "src/infrastructure/persistence/rfq_supplier_repository.rs"
  - "src/infrastructure/persistence/supplier_quotation_repository.rs"
  - "src/infrastructure/persistence/supplier_quotation_item_repository.rs"
  - "src/presentation/http/guarded_routes.rs"
  - "tests/buying_golden_cases.rs"
  - "tests/integrity_probes.rs"
  - "tests/receipt_seam.rs"
  - "tests/funnel_and_events.rs"
  - "migrations/20260426220020_po_three_way_match_check.*"
  # Hand-authored behavior (services + their HTTP surface). Examples:
  # - "src/application/service/onboarding_service.rs"
  # - "src/presentation/http/guarded_routes.rs"

  # Behavior tests (the golden cases / oracle) + BDD features.
  - "tests/features/**"
  # - "tests/*_golden_cases.rs"
  # - "tests/integrity_probes.rs"

  # Hand-authored module documentation.
  - "docs/**"
