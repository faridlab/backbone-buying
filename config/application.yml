server:
  host: 0.0.0.0
  port: 8080
  grpc_port: 50051
database:
  url: postgresql://root:password@localhost:5432/skeletondb
  max_connections: 10
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
logging:
  level: info
  format: json
  file: logs/buying.log
module:
  name: buying
  enabled: true
features:
  soft_delete: true
  state_machines: false
  workflows: true
entities:
  material_request:
    collection: material_requests
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  material_request_item:
    collection: material_request_items
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  purchase_order:
    collection: purchase_orders
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  purchase_order_item:
    collection: purchase_order_items
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  request_for_quotation:
    collection: request_for_quotations
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  rfq_item:
    collection: rfq_items
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  rfq_supplier:
    collection: rfq_suppliers
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  supplier_quotation:
    collection: supplier_quotations
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  supplier_quotation_item:
    collection: supplier_quotation_items
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
